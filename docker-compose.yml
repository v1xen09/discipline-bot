services:
  tmanager:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"        # REST API (запускается внутри того же процесса)
    volumes:
      - db_data:/app/tmanager.db
      - hf_cache:/root/.cache/huggingface

    # Нужно для доступа к LM Studio на хосте из контейнера (Windows/Linux).
    # В .env: LMSTUDIO_BASE_URL=http://host.docker.internal:4321/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  db_data:
  hf_cache:
